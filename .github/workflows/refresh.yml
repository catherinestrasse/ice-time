name: Daily Skate Schedule Refresh

on:
  schedule:
    # 6:00 AM EST is 10:00 AM UTC
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows manual refresh anytime

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: pip install requests
    - name: Run Scraper
      run: python update_schedule.py
    - name: Commit and Push Changes
      run: |
        git config --global user.name "Skate Bot"
        git config --global user.email "bot@example.com"
        git add schedule.json
        git commit -m "Automated daily 6AM refresh" || exit 0
        git push
